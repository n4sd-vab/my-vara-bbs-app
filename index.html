<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>VARA Mail Demo</title>
    <style>
        body {
            background: #f8fafc;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
        }

        #toolbar {
            padding: 10px;
            background: #eee;
            display: flex;
            gap: 10px;
        }

        #log {
            height: 250px;
            overflow-y: auto;
            background: #111;
            color: #0f0;
            padding: 8px;
            font-family: monospace;
        }

        #commandInput {
            width: 100%;
        }

        #emailArea {
            width: 100%;
            height: 250px;
        }
        #splitPane {
            resize: vertical;
            overflow: auto;
            border-bottom: 5px solid #888;
            cursor: ns-resize;
        }

        .section {
            padding: 10px;
        }
        .section2 {
            padding: 5px;
        }
        .status-bar {
            display: flex;
            align-items: center;
            background-color: #f1f1f1;
            padding: 5px;
        }

        .separator {
            width: 1px;
            height: 20px;
            /* Adjust height as needed */
            background-color: #ccc;
            margin: 0 5px;
            /* Space on either side of the separator */
        }


        .msgLink {
            color: #0af;
            cursor: pointer;
            text-decoration: underline;
        }

        .msgLink:hover {
            color: #5cf;
        }

        .msgRow {
            padding: 2px 0;
            cursor: pointer;
        }

        .msgRow:hover {
            background: #fff;
        }

        .msgNum {
            color: #0af;
            text-decoration: underline;
            margin-right: 6px;
        }

        .msgRow.selected {
            background: #eee;
        }

        span.fixed-width {
            display: inline-block;
            width: 125px;
        }

        /* Modal overlay */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.45);
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        /* Modal window */
        .modal-window {
            background: #fff;
            color: #222;
            padding: 20px;
            width: 420px;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.4);
            font-family: sans-serif;
        }

        /* Inputs */
        .modal-input,
        .modal-textarea {
            width: 100%;
            margin-bottom: 12px;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }

        /* Buttons */
        .modal-buttons {
            text-align: right;
            margin-top: 10px;
        }

        .modal-btn {
            padding: 8px 14px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-left: 8px;
            font-size: 14px;
        }

        .modal-btn.cancel {
            background: #ccc;
        }

        .modal-btn.send {
            background: #0078ff;
            color: white;
        }
    </style>
</head>

<body>
    <div id="toolbar" style="display:flex; gap:10px; padding:10px; background:#eee;">

        <button id="connectBtn">Connect to VARA</button>
        <button id="disconnectBtn" disabled>Disconnect</button>
        <div class="separator"></div>

        <button id="connectBbsBtn">Connect BBS</button>
        <button id="disconnectBbsBtn" disabled>Disconnect BBS</button>
        <div class="separator"></div>
        <button id="listMineBtn">List Mine</button>
        <button id="listBullBtn">List Bulletins</button>
        <button id="listWxBtn">List Weather</button>
        <button id="listAllBtn">List All</button>
        <div class="separator"></div>
        <button id="sendBtn">Send Message</button>

    </div>
    <div id="statusBar" style="
        display: flex;
        gap: 20px;
        padding: 6px 10px;
        background: #222;
        color: #0f0;
        font-family: monospace;
        ">
        <div>VARA: <span class="fixed-width" id="statusText"style="color: #f33;">Disconnected</span></div>
        <div>LINK: <span class="fixed-width" id="statusLink"style="color: #f33;">Down</span></div>
        <div>BUSY: <span class="fixed-width" id="statusBusy">Off</span></div>
        <div>PTT: <span class="fixed-width" id="statusPTT">Off</span></div>
        <div>SNR: <span class="fixed-width" id="statusSNR">--</span></div>
        <div>BITRATE: <span class="fixed-width" id="statusRate">--</span></div>
    </div>

    <!-- VARA COMMAND CONSOLE (6 lines) -->
    <div id="varaConsoleSection" class="section">
        <h3>Vara Command Monitor</h3> 
        <textarea id="commandConsole" rows="6" readonly
            style="width:100%; resize:vertical; font-family:monospace;"></textarea> 
        <input id="commandInput"
            placeholder="Enter VARA API commands and press Enter" style="width:100%;" />
    </div>

    <!-- RECEIVED DATA (30 lines) -->
    <div id="splitPane" style="
            display:flex;
            height:400px;
            resize: vertical;
            overflow: auto;
            border: 2px solid transparent;
            max-height: calc(100vh - 200px);
            gap:10px; padding: 10px;
         ">

        <!-- LEFT: Message List -->
        <div id="msgList" style="flex:1; overflow-y:auto; background:#ffffff; color:rgb(5, 5, 5); 
                font-family:monospace; padding:8px; border: 1px solid black; border-radius: 5px;">
        </div>

        <!-- RIGHT: Message Viewer -->
        <div id="msgView" style="flex:2; overflow-y:auto; background:#ffffff; color:rgb(5, 5, 5); 
                font-family:monospace; padding:8px; border: 1px solid black; border-radius: 5px;">
            <em>Select a message to view it</em>
        </div>

    </div>

    <!-- SEND DATA (single line) -->
    <div class="section">
        <h4>Send BBS Commands (press Enter)</h4>
        <input id="txInput" type="text" placeholder="Enter BBS Commands to send" style="width:100%;" />
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', async () => {
            let varaLinkUp = false;

            // Load settings ONCE
            const appSettings = await window.settings.get();

            // Get DOM elements
            const sendBtn = document.getElementById('sendBtn');
            const composeModal = document.getElementById('composeModal');
            const composeCancelBtn = document.getElementById('composeCancelBtn');
            const composeTo = document.getElementById('composeTo'); 
            const composeSubject = document.getElementById('composeSubject'); 
            const composeType = document.getElementById('composeType');

            const addressBookModal = document.getElementById('addressBookModal');
            const addressBookCancelBtn = document.getElementById('addressBookCancelBtn');
            const addressBookSaveBtn = document.getElementById('addressBookSaveBtn');
            const addCallsign = document.getElementById('addCallsign');
            const addName = document.getElementById('addName');
            const addLocation = document.getElementById('addLocation');
            const addHomeBBS = document.getElementById('addHomeBBS');
            const addNotes = document.getElementById('addNotes');

            const connectBtn = document.getElementById('connectBtn');
            const connectBbsBtn = document.getElementById('connectBbsBtn');
            const disconnectBbsBtn = document.getElementById('disconnectBbsBtn');
            const listMineBtn = document.getElementById('listMineBtn');
            const listBullBtn = document.getElementById('listBullBtn');
            const listWxBtn = document.getElementById('listWxBtn');
            const listAllBtn = document.getElementById('listAllBtn');
            const commandConsole = document.getElementById('commandConsole');
            const commandInput = document.getElementById('commandInput');
            const rxArea = document.getElementById('rxArea');
            const txInput = document.getElementById('txInput');

            const statusConn = document.getElementById('statusConn');
            const statusLink = document.getElementById('statusLink');
            const statusBusy = document.getElementById('statusBusy');
            const statusPTT = document.getElementById('statusPTT');
            const statusSNR = document.getElementById('statusSNR');
            const statusRate = document.getElementById('statusRate');

            const statusText = document.getElementById('statusText');
            const disconnectBtn = document.getElementById('disconnectBtn');

            const composeSendBtn = document.getElementById('composeSendBtn');

            console.log("Loaded settings:", appSettings);

            window.electronAPI.onReplyToSender(({ sender, subject }) => {
                composeModal.style.display = "flex";
                composeTo.value = sender;
                composeSubject.value = "Re: " + subject;
                composeType.value = "P";
            });

            document.getElementById("varaConsoleSection").style.display = 
                appSettings.showVaraConsole ? "block" : "none";

            console.log("txInput:", txInput);

            // Append text to command console
            function appendCommand(type, msg) {
                commandConsole.value += `[${type}] ${msg}\n`;
                commandConsole.scrollTop = commandConsole.scrollHeight;
            }

            function formatBbsLine(line) {
                const parts = line.trim().split(/\s+/);
                const msgNum = parts[0];

                return `
                <div class="msgRow" data-msg="${msgNum}">
                    <span class="msgNum">${msgNum}</span>
                    ${parts.slice(1).join(" ")}
                </div>
            `;
            }

            function clearMessageWindows() {
                msgList.innerHTML = "";
                msgView.innerHTML = "<em>Select a message to view it</em>";
            }
            
            function parseMsgListLine(line) {
                const parts = line.trim().split(/\s+/);
                const msgNum = parts[0];
                const sender = parts[6] || "";
                const subject = parts.slice(6).join(" ");
                return { msgNum, sender, subject };
            }

            // Handle incoming logs from main.js



            function setConnectedUI(connected) {
                connectBtn.disabled = connected;
                disconnectBtn.disabled = !connected;
                disconnectBbsBtn.disabled = !connected;

                connectBbsBtn.disabled = !connected;
                listMineBtn.disabled = !connected;
                listBullBtn.disabled = !connected;
                listWxBtn.disabled = !connected;
                listAllBtn.disabled = !connected;

                statusText.textContent = connected ? "Connected" : "Disconnected";
                statusText.style.color = connected ? "#0f0" : "#f33";
            }
            // Listen for VARA console toggle from main process
            window.electronAPI.onToggleVaraConsole((visible) => {
                const section = document.getElementById("varaConsoleSection");
                section.style.display = visible ? "block" : "none";
            });


            const cancelBtn = document.getElementById("addressBookCancelBtn");
            const saveBtn = document.getElementById("addressBookSaveBtn");

            window.electronAPI.onOpenAddressBook(() => {
                addressBookModal.style.display = "flex";
            });

            cancelBtn.addEventListener("click", () => {
                addressBookModal.style.display = "none";
            });

            saveBtn.addEventListener("click", () => {
                // You’ll wire this to the DB next
                addressBookModal.style.display = "none";
            });

    

            // Listen for message context menu events

            window.vara.onLog(({ type, msg }) => {
                appendCommand(type, msg);

                // Connection state
                if (msg.startsWith("Connected to VARA")) {
                    setConnectedUI(true)
                    statusConn.textContent = "Connected";
                    statusConn.style.color = "#0f0";
                }
                if (msg.includes("socket closed")) {
                    setConnectedUI(false)
                    statusConn.textContent = "Disconnected";
                    statusConn.style.color = "#f33";
                }
                if (msg.includes("CONNECTED")) {
                    statusLink.textContent = "BBS Link Up";
                    statusLink.style.color = "#0f0";
                }
                if (msg.includes("DISCONNECTED")) {
                    statusLink.textContent = "BBS Link Down";
                    statusLink.style.color = "#f33";
                }
                // Busy
                if (msg.includes("BUSY ON")) {
                    statusBusy.textContent = "On";
                    statusBusy.style.color = "#f33";
                }
                if (msg.includes("BUSY OFF")) {
                    statusBusy.textContent = "Off";
                    statusBusy.style.color = "#0f0";
                }

                // PTT
                if (msg.startsWith("PTT ON")) {
                    statusPTT.textContent = "On";
                    statusPTT.style.color = "#f33";
                }
                if (msg.startsWith("PTT OFF")) {
                    statusPTT.textContent = "Off";
                    statusPTT.style.color = "#0f0";
                }

                // SNR
                if (msg.startsWith("SN")) {
                    const snr = msg.replace("SNR", "").split('\r')[0];
                    statusSNR.textContent = snr;
                    const rate = msg.replace("BITRATE", "").split('\r')[1];
                    statusRate.textContent = rate;
                }

                // Bitrate
                if (msg.startsWith("BITRATE")) {
                    const rate = msg.replace("BITRATE", "").split('\r')[0];
                    statusRate.textContent = rate;
                }

                if (msg.includes("CONNECTED")) varaLinkUp = true;
                if (msg.includes("DISCONNECTED")) varaLinkUp = false;


                // existing data routing logic...
                if (type === 'data') {
                    const msgListPattern = /^\s*\d+\s+\d{1,2}-[A-Za-z]{3}\s+[A-Z$]{1,3}\s+\d+/;

                    if (msgListPattern.test(msg)) {
                        msgList.innerHTML += formatBbsLine(msg);
                        msgList.scrollTop = msgList.scrollHeight;
                    } else {
                        msgView.innerHTML += msg + "<br>";
                        msgView.scrollTop = msgView.scrollHeight;
                    }
                }
            });

            connectBtn.addEventListener('click', async () => {
                try {
                    await window.vara.connect();
                    appendCommand('info', 'Connect requested');
                } catch (err) {
                    appendCommand('error', 'Connect failed: ' + err.message);
                }
            });

            // Command input (Enter to send)
            commandInput.addEventListener('keydown', async (e) => {
                if (e.key === 'Enter') {
                    const line = commandInput.value.trim();
                    if (!line) return;
                    appendCommand('local', '> ' + line);
                    commandInput.value = '';
                    try {
                        await window.vara.sendCommand(line);
                    } catch (err) {
                        appendCommand('error', 'Send command failed: ' + err.message);
                    }
                }
            });

            txInput.addEventListener('keydown', async (e) => {
                console.log("Key Pressed:", e.key);

                if (e.key === 'Enter') {
                    e.preventDefault();

                    const text = txInput.value.trim();
                    if (!text) return;

                    appendCommand('local', 'TX: ' + text);
                    txInput.value = '';

                    try {
                        await window.vara.sendData(text + "\r");
                    } catch (err) {
                        appendCommand('error', 'Send data failed: ' + err.message);
                    }
                }
            });

            // Connect BBS button
            connectBbsBtn.addEventListener('click', async () => {
                const cmd = `CONNECT ${appSettings.myCall} ${appSettings.bbsCall}${appSettings.digi1 ? " VIA " + appSettings.digi1 : ""}${appSettings.digi2 ? appSettings.digi2 : ""}\r`;
                appendCommand('local', '> ' + cmd);
                try {
                    await window.vara.sendCommand(cmd);
                } catch (err) {
                    appendCommand('error', 'Connect BBS failed: ' + err.message);
                }
            });
            disconnectBbsBtn.addEventListener('click', async () => {
                const cmd = `B\r`;
                appendCommand('local', '> ' + cmd);
                try {
                    await window.vara.sendData(cmd);
                } catch (err) {
                    appendCommand('error', 'Disconnect BBS failed: ' + err.message);
                }
            });

            disconnectBtn.addEventListener('click', async () => {
                appendCommand('local', '> DISCONNECT');
                try {
                    await window.vara.disconnect();
                } catch (err) {
                    appendCommand('error', 'Disconnect failed: ' + err.message);
                }
            });

            // List Mine (LM) — goes to DATA port
            listMineBtn.addEventListener('click', async () => {
                clearMessageWindows();
                const text = "LM\r";
                appendCommand('local', 'TX: LM');
                try {
                    await window.vara.sendData(text);
                } catch (err) {
                    appendCommand('error', 'List Mine failed: ' + err.message);
                }
            });

            listBullBtn.addEventListener('click', async () => {
                clearMessageWindows();
                const text = "LB\r";
                appendCommand('local', 'TX: LB');
                try {
                    await window.vara.sendData(text);
                } catch (err) {
                    appendCommand('error', 'List Bulletins failed: ' + err.message);
                }
            });

            listWxBtn.addEventListener('click', async () => {
                clearMessageWindows();
                const text = "L> WX\r";
                appendCommand('local', 'TX: LW');
                try {
                    await window.vara.sendData(text);
                } catch (err) {
                    appendCommand('error', 'List Weather failed: ' + err.message);
                }
            });

            // List All (L) — goes to DATA port
            listAllBtn.addEventListener('click', async () => {
                clearMessageWindows();
                const text = "L\r";
                appendCommand('local', 'TX: L');
                try {
                    await window.vara.sendData(text);
                } catch (err) {
                    appendCommand('error', 'List All failed: ' + err.message);
                }
            });

            // Message click handler (event delegation)
            document.addEventListener('click', async (e) => {
                const row = e.target.closest('.msgRow');
                if (!row) return;

                // Remove selection from all rows
                document.querySelectorAll('.msgRow.selected')
                    .forEach(r => r.classList.remove('selected'));

                // Highlight the clicked row
                row.classList.add('selected');

                row.scrollIntoView({ block: "nearest" });


                const msgNum = row.dataset.msg;

                appendCommand('local', `TX: R ${msgNum}`);
                msgView.innerHTML = `<em>Loading message ${msgNum}...</em>`;

                try {
                    await window.vara.sendData(`R ${msgNum}\r`);
                } catch (err) {
                    appendCommand('error', 'Read message failed: ' + err.message);
                }
            });

            document.addEventListener('contextmenu', (e) => {
                const row = e.target.closest('.msgRow');
                if (!row) return;

                e.preventDefault();

                const msgNum = row.dataset.msg;
                const rawLine = row.textContent.trim();
                const { sender, subject } = parseMsgListLine(rawLine);

                window.electronAPI.showMessageContextMenu({
                    msgNum,
                    sender,
                    subject
                });
            });
        
            

            sendBtn.addEventListener('click', () => {
                composeModal.style.display = "flex";
            });

            composeCancelBtn.addEventListener('click', () => {
                composeModal.style.display = "none";
            });

            

            composeSendBtn.addEventListener('click', async () => {
                const to = document.getElementById('composeTo').value.trim();
                const subject = document.getElementById('composeSubject').value.trim();
                const type = document.getElementById('composeType').value;
                const body = document.getElementById('composeBody').value;

                if (!to || !subject || !body) {
                    appendCommand('error', 'All fields are required');
                    return;
                }

                // If link is down, reconnect before sending
                if (!varaLinkUp) {
                    appendCommand('info', 'Link is down, attempting to reconnect...');
                    try {
                        await window.vara.sendCommand(`CONNECT ${appSettings.myCall} ${appSettings.bbsCall}${appSettings.digi1 ? " VIA " + appSettings.digi1 : ""}${appSettings.digi2 ? appSettings.digi2 : ""}\r`);
                        appendCommand('info', 'Reconnect command sent');
                    } catch (err) {
                        appendCommand('error', 'Reconnect failed: ' + err.message);
                        return;
                    }
                }

                // Build BBS message format
                const cmd = (type === "P") ? `SP ${to}\r` : `SB ${to}\r`;
                const msg =
                    cmd +
                    `${subject}\r` +
                    body.replace(/\n/g, "\r") +
                    `\r/EX\r`;

                appendCommand('local', 'TX: Sending message');

                try {
                    await window.vara.sendData(msg);
                    composeModal.style.display = "none";

                    composeTo.value = "";
                    composeSubject.value = "";
                    composeBody.value = "";
                    composeType.value = "P";
                } catch (err) {
                    appendCommand('error', 'Send failed: ' + err.message);
                }
            });

            document.querySelectorAll('.msgRow').forEach(r => r.classList.remove('selected'));
            row.classList.add('selected');
            // Is this needed? Maybe not, since we clear the message view when clicking a message, 
            // but it ensures the form is reset if user clicks "Send Message" again after sending one.
            composeTo.value = "";
            composeSubject.value = "";
            composeBody.value = "";
            composeType.value = "P";

            composeModal.addEventListener('click', (e) => {
                if (e.target === composeModal) {
                    composeModal.style.display = "none";
                }
            });
        });

    </script>

    <div id="composeModal" class="modal-overlay">
        <div class="modal-window">
            <h3>Compose BBS Message</h3>

            <label>To:</label><br>
            <input id="composeTo" class="modal-input"><br>

            <label>Subject:</label><br>
            <input id="composeSubject" class="modal-input"><br>

            <label>Type:</label><br>
            <select id="composeType" class="modal-input">
                <option value="P">Private</option>
                <option value="B">Bulletin</option>
            </select><br>

            <label>Message:</label><br>
            <textarea id="composeBody" rows="8" class="modal-input"></textarea>

            <div style="text-align:right;">
                <button id="composeCancelBtn" class="modal-btn cancel">Cancel</button>
                <button id="composeSendBtn" class="modal-btn send">Send</button>
            </div>
        </div>
    </div>


    <div id="addressBookModal" class="modal-overlay">
        <div class="modal-window">
            <h3>Address Book</h3>

            <label>Callsign:</label><br>
            <input id="addCallsign" class="modal-input"><br>

            <label>Name:</label><br>
            <input id="addName" class="modal-input"><br>

            <label>Location:</label><br>
            <input id="addLocation" class="modal-input"><br>

            <label>Home BBS:</label><br>
            <input id="addHomeBBS" class="modal-input"><br>

            <label>Notes:</label><br>
            <textarea id="addNotes" rows="4" class="modal-input"></textarea>

            <div style="text-align:right;">
                <button id="addressBookCancelBtn" class="modal-btn cancel">Cancel</button>
                <button id="addressBookSaveBtn" class="modal-btn save">Save</button>
            </div>
        </div>
    </div>
</body>

</html>
