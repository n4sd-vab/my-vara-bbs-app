<html>

<head>
  <meta charset="UTF-8">
  <title>Preferences</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    label {
      display: inline-block;
      width: 150px;
      margin-bottom: 10px;
    }

    input[type="text"],
    input[type="number"] {
      width: 200px;
      padding: 5px;
    }

    .dir-picker {
      display: flex;
      align-items: center;
    }

    .dir-picker input {
      flex: 1;
    }

    .dir-picker button {
      margin-left: 10px;
      padding: 5px 10px;
    }

    .category-list {
      max-height: 200px;
      overflow-y: auto;
      border: 1px solid #ccc;
      padding: 10px;
    }

    h2 {
      margin-top: 25px;
      border-bottom: 1px solid #ccc;
      padding-bottom: 4px;
      color: #333;
    }

    #subscriptionList {
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 300px;
      overflow-y: auto;
      padding-right: 6px;
    }

    #subscriptionList div {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 4px;
    }

    #subscriptionList label {
      font-size: 14px;
      color: #222;
    }

    #saveSubscriptionsBtn {
      margin-top: 15px;
      padding: 8px 14px;
      font-size: 14px;
      border-radius: 4px;
      border: 1px solid #888;
      background: #e8e8e8;
      cursor: pointer;
    }

    #saveSubscriptionsBtn:hover {
      background: #dcdcdc;
    }
  </style>
</head>

<body>

  <h2>Preferences</h2>

  <label>My Call:</label>
  <input id="myCall"><br>

  <label>BBS Call:</label>
  <input id="bbsCall"><br>

  <label>Node Call:</label>
  <input id="nodeCall"><br>

  <label>Digi 1:</label>
  <input id="digi1"><br>

  <label>Digi 2:</label>
  <input id="digi2"><br>
  <br>
  <label>VARA IP:</label>
  <input id="varaIP"><br>

  <label>VARA Command Port:</label>
  <input id="varaCmdPort"><br>

  <label>VARA Data Port:</label>
  <input id="varaDataPort"><br>
  <br>
  <label>YAPP Receive Directory</label>
  <div class="dir-picker">
    <input id="yappDirInput" type="text" readonly>
    <button id="yappDirButton">Browse…</button>
  </div>
  <br>
  <button id="saveBtn">Save</button>
  <br>
  <h2>Bulletin Subscriptions</h2>
  <div id="subscriptionList" class="category-list"></div>>

  <button id="saveSubscriptionsBtn">Save Subscriptions</button>

  <script>
    window.addEventListener('DOMContentLoaded', async () => {
      const s = await window.settings.get();

      myCall.value = s.myCall;
      bbsCall.value = s.bbsCall;
      nodeCall.value = s.nodeCall;
      digi1.value = s.digi1;
      digi2.value = s.digi2;
      varaIP.value = s.varaIP;
      varaCmdPort.value = s.varaCmdPort;
      varaDataPort.value = s.varaDataPort;
      yappDirInput.value = s.yappReceiveDir || "";

      saveBtn.addEventListener('click', async () => {
        await window.settings.set({
          myCall: myCall.value,
          bbsCall: bbsCall.value,
          nodeCall: nodeCall.value,
          digi1: digi1.value,
          digi2: digi2.value,
          varaIP: varaIP.value,
          varaCmdPort: Number(varaCmdPort.value),
          varaDataPort: Number(varaDataPort.value),
          yappReceiveDir: yappDirInput.value
        });

        window.close();
      });
    });

    document.getElementById("yappDirButton").addEventListener("click", async () => {
      const dir = await window.electronAPI.pickDirectory();
      if (dir) {
        document.getElementById("yappDirInput").value = dir;
        window.electronAPI.saveSetting("yappReceiveDir", dir);
      }
    });

    document.addEventListener("DOMContentLoaded", async () => {
      // Load categories from main
      const categories = await window.electronAPI.getBulletinCategories();
      const subs = await window.settings.getSetting("subscriptions") || [];

      const container = document.getElementById("subscriptionList");

      categories.forEach(cat => {
        const row = document.createElement("div");

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.value = cat.category;   // ← FIXED
        checkbox.checked = subs.includes(cat.category);

        const label = document.createElement("label");
        label.textContent = `${cat.category} (${cat.count})`;  // ← FIXED

        row.appendChild(checkbox);
        row.appendChild(label);
        container.appendChild(row);
      });

      // Save button
      document.getElementById("saveSubscriptionsBtn").addEventListener("click", async () => {
        const selected = [...container.querySelectorAll("input[type=checkbox]:checked")]
          .map(cb => cb.value);

        await window.settings.saveSetting("subscriptions", selected);

        window.electronAPI.onToast("Subscriptions saved");
      });
    });
  </script>
</body>

</html>
